name: Update profile stats

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:       # run manually any time

permissions:
  contents: write

jobs:
  # ── Codeforces stats card ──────────────────────────────────────────────
  codeforces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - run: python scripts/cf_card.py

      - name: Commit CF card
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cf-stats.svg
          git diff --staged --quiet || (git commit -m "chore: update CF stats" && git push)

  # ── GitHub language / contribution metrics ─────────────────────────────
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Output file committed to this repo
          filename: assets/github-metrics.svg

          user: PriyanshuIITGHY2006
          template: classic
          base: header, repositories

          # Language breakdown
          plugin_languages: yes
          plugin_languages_ignored: >-
            html,css,scss,typescript,javascript,mdx,shell,dockerfile
          plugin_languages_limit: 5
          plugin_languages_details: percentage
          plugin_languages_colors: github

          config_timezone: Asia/Kolkata
          config_display: regular
          config_padding: 6%
